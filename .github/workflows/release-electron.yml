name: Release Electron App
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Windows build (x64)
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: DesktopApp/package-lock.json

    - name: Install dependencies
      working-directory: ./DesktopApp
      run: npm ci

    - name: Build React app
      working-directory: ./DesktopApp
      env:
        REACT_APP_API_BASE_URL: https://factor-claim.vercel.app
        REACT_APP_API_TIMEOUT: 30000
      run: npm run build

    - name: Package Electron app
      working-directory: ./DesktopApp
      run: npm run make

    - name: Generate latest.yml for auto-updater
      working-directory: ./DesktopApp
      shell: pwsh
      run: |
        $version = (Get-Content package.json | ConvertFrom-Json).version
        $exe = Get-ChildItem "out/make/squirrel.windows/x64/FactorClaimSetup.exe" -ErrorAction SilentlyContinue
        if ($exe) {
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
          $size = $exe.Length
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ"
          @"
        version: $version
        files:
          - url: FactorClaimSetup.exe
            sha512: $hash
            size: $size
        path: FactorClaimSetup.exe
        sha512: $hash
        releaseDate: '$date'
        "@ | Out-File -FilePath "out/make/squirrel.windows/x64/latest.yml" -Encoding utf8
        }

    - name: Upload Windows release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          DesktopApp/out/make/squirrel.windows/x64/*.exe
          DesktopApp/out/make/squirrel.windows/x64/*.nupkg
          DesktopApp/out/make/squirrel.windows/x64/RELEASES
          DesktopApp/out/make/squirrel.windows/x64/latest.yml
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Linux ARM64 build (ARM Chromebooks like Lenovo, Raspberry Pi, etc.)
  release-linux-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: DesktopApp/package-lock.json

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 \
          libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 \
          libasound2t64 libx11-xcb1 fakeroot rpm

    - name: Install dependencies
      working-directory: ./DesktopApp
      run: npm ci

    - name: Build React app
      working-directory: ./DesktopApp
      env:
        REACT_APP_API_BASE_URL: https://factor-claim.vercel.app
        REACT_APP_API_TIMEOUT: 30000
      run: npm run build

    - name: Package Electron app (Linux ARM64)
      working-directory: ./DesktopApp
      run: npx electron-builder --linux --arm64 --publish never

    - name: Upload Linux ARM64 release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          DesktopApp/dist/*arm64*.AppImage
          DesktopApp/dist/*arm64*.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}